<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Quiz</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .btn { padding: 15px; cursor: pointer; background: #444; color: white; border: 2px solid #666; font-weight: bold; border-radius: 8px; transition: 0.2s; font-size: 18px; }
        .shake { animation: shake 0.2s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .win-67 { font-size: 140px; background: linear-gradient(45deg, #f1c40f, #e67e22); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(241,196,15,0.6)); margin: 0; }
    </style>
</head>
<body>
    <div id="game-container" style="text-align: center; width: 100%;"></div>

<script>
    const quiz = [
        { h: "סירה", e: "Boat", i: "🛶" }, { h: "חרב", e: "Sword", i: "⚔️" }, { h: "יהלום", e: "Diamond", i: "💎" },
        { h: "תפוח", e: "Apple", i: "🍎" }, { h: "קשת", e: "Bow", i: "🏹" }, { h: "מכוש", e: "Pickaxe", i: "⛏️" },
        { h: "מיטה", e: "Bed", i: "🛌" }, { h: "לחם", e: "Bread", i: "🍞" }, { h: "חץ", e: "Arrow", i: "🎯" },
        { h: "פעמון", e: "Bell", i: "🔔" }, { h: "ברזל", e: "Iron", i: "⛓️" }, { h: "פחם", e: "Coal", i: "🌑" },
        { h: "לפיד", e: "Torch", i: "🔦" }, { h: "תיבה", e: "Chest", i: "📦" }, { h: "חכה", e: "Fishing Rod", i: "🎣" },
        { h: "מפה", e: "Map", i: "🗺️" }, { h: "מצפן", e: "Compass", i: "🧭" }, { h: "שעון", e: "Clock", i: "⏰" },
        { h: "דלי", e: "Bucket", i: "🪣" }, { h: "מספריים", e: "Shears", i: "✂️" }, { h: "תרנגולת", e: "Chicken", i: "🐔" },
        { h: "פרה", e: "Cow", i: "🐄" }, { h: "עכביש", e: "Spider", i: "🕷️" }, { h: "זאב", e: "Wolf", i: "🐺" },
        { h: "דבורה", e: "Bee", i: "🐝" }, { h: "דג", e: "Fish", i: "🐟" }, { h: "עוגה", e: "Cake", i: "🎂" },
        { h: "עוגייה", e: "Cookie", i: "🍪" }, { h: "דלת", e: "Door", i: "🚪" }, { h: "סולם", e: "Ladder", i: "🪜" },
        { h: "סדן", e: "Anvil", i: "🔨" }, { h: "דינמיט", e: "TNT", i: "🧨" }, { h: "ספר", e: "Book", i: "📖" },
        { h: "נייר", e: "Paper", i: "📄" }, { h: "עור", e: "Leather", i: "👞" }, { h: "נוצה", e: "Feather", i: "🪶" },
        { h: "ביצה", e: "Egg", i: "🥚" }, { h: "חלב", e: "Milk", i: "🥛" }, { h: "סוכר", e: "Sugar", i: "🧂" },
        { h: "ארנב", e: "Rabbit", i: "🐰" }
    ];

    let step = 0, score = 0;
    const container = document.getElementById('game-container');

    function draw() {
        if (step >= quiz.length) return end();
        const cur = quiz[step];
        const opts = [cur.e, "Table", "Glass", "Stone", "Wood"].sort(() => Math.random() - 0.5);

        container.innerHTML = `
            <div style="margin-bottom:20px; color:#888;">שלב ${step + 1} / ${quiz.length}</div>
            <h1 style="font-size:30px;">איך אומרים <span style="color:#f1c40f;">${cur.h}</span>?</h1>
            <div id="emoji" style="font-size:100px; margin:30px;">${cur.i}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:300px; margin:0 auto;">
                ${opts.map(o => `<button class="btn" onclick="check('${o}', '${cur.e}')">${o}</button>`).join('')}
            </div>
        `;
    }

    window.check = (picked, correct) => {
        const emoji = document.getElementById('emoji');
        if (picked === correct) {
            score++;
            step++;
            draw();
        } else {
            emoji.classList.remove('shake');
            void emoji.offsetWidth; // Trigger reflow
            emoji.classList.add('shake');
            setTimeout(() => { step++; draw(); }, 400);
        }
    };

    function end() {
        container.innerHTML = `
            <h1 class="win-67">67</h1>
            <p style="font-size:24px;">VIBE CHECK PASSED</p>
            <p>צברת ${score} XP!</p>
            <button class="btn" onclick="location.reload()" style="background:white; color:black;">שחק שוב</button>
        `;
    }

    draw();
</script>
</body>
</html>
